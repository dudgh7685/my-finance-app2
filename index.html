<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 가계부 PWA</title>
    <!-- Tailwind CSS (UI 디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (엑셀 파싱) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- ECharts (차트 렌더링) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Pretendard', sans-serif; padding-bottom: 80px; }
        .hide { display: none !important; }
        .tab-active { color: #3b82f6; border-top: 3px solid #3b82f6; font-weight: bold; }
        .tab-inactive { color: #9ca3af; border-top: 3px solid transparent; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        
        <!-- 상단 헤더 & 파일 업로드 -->
        <div class="p-5 bg-blue-600 text-white rounded-b-3xl shadow-md">
            <h1 class="text-xl font-bold text-center mb-4">나만의 스마트 가계부</h1>
            <label class="flex flex-col items-center justify-center w-full p-3 border-2 border-white border-dashed rounded-xl cursor-pointer hover:bg-blue-700 transition">
                <span class="font-semibold text-sm">엑셀 파일 업로드 (.xlsx)</span>
                <input type="file" id="fileUpload" accept=".xlsx" class="hidden" />
            </label>
        </div>

        <!-- 탭 1: 월간 대시보드 -->
        <div id="tab-monthly" class="p-5 space-y-6">
            
            <!-- 자산 현황 -->
            <div class="bg-gray-50 rounded-2xl p-5 shadow-sm border border-gray-100">
                <p class="text-gray-500 text-sm font-medium">현재 총 자산 (군인공제 포함)</p>
                <h2 id="totalAsset" class="text-3xl font-bold text-gray-800 mt-1">0 원</h2>
            </div>

            <!-- 월 네비게이션 -->
            <div class="flex justify-between items-center bg-white rounded-full shadow-sm p-2 border border-gray-200">
                <button id="prevMonth" class="px-4 py-2 text-gray-500 hover:text-blue-600 font-bold">◀</button>
                <div class="text-center">
                    <h3 id="currentMonthLabel" class="font-bold text-lg text-gray-800">2026년 6월</h3>
                    <p id="cycleLabel" class="text-xs text-gray-400">(06.10 ~ 07.09)</p>
                </div>
                <button id="nextMonth" class="px-4 py-2 text-gray-500 hover:text-blue-600 font-bold">▶</button>
            </div>

            <!-- 예산 관리 -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold text-gray-700">이번 달 예산</h3>
                    <div class="space-x-2">
                        <button id="loadPrevBudget" class="text-xs text-blue-500 bg-blue-50 px-2 py-1 rounded">저번달 불러오기</button>
                        <button id="setBudgetBtn" class="text-xs text-white bg-blue-500 px-2 py-1 rounded">저장</button>
                    </div>
                </div>
                <input type="number" id="budgetInput" placeholder="목표 예산 입력 (원)" class="w-full p-2 border rounded-lg text-sm mb-3">
                
                <div class="relative w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                    <div id="budgetBar" class="bg-green-500 h-4 transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="budgetStatus" class="text-right text-xs text-gray-500 mt-2">예산을 설정해주세요.</p>
            </div>

            <!-- 요약 (수입/지출) -->
            <div class="flex gap-4">
                <div class="flex-1 bg-green-50 rounded-2xl p-4 border border-green-100">
                    <p class="text-green-600 text-xs font-bold">총 수입</p>
                    <p id="totalIncome" class="text-lg font-bold text-gray-800 mt-1">0 원</p>
                </div>
                <div class="flex-1 bg-red-50 rounded-2xl p-4 border border-red-100">
                    <p class="text-red-600 text-xs font-bold">총 지출</p>
                    <p id="totalExpense" class="text-lg font-bold text-gray-800 mt-1">0 원</p>
                </div>
            </div>

            <!-- 생키 다이어그램 -->
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-2">지출 흐름도</h3>
                <div id="sankeyChart" style="width: 100%; height: 300px;"></div>
            </div>
        </div>

        <!-- 탭 2: 연간 결산 -->
        <div id="tab-annual" class="p-5 space-y-6 hide">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">연간 결산 리포트</h2>
            <p class="text-sm text-gray-500 mb-4">업로드된 엑셀 데이터의 전체 흐름입니다.</p>
            
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-2">월별 수입/지출 추이</h3>
                <div id="annualBarChart" style="width: 100%; height: 250px;"></div>
            </div>

            <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                <h3 class="font-bold text-gray-700 mb-2">연간 지출 카테고리 TOP</h3>
                <div id="annualPieChart" style="width: 100%; height: 300px;"></div>
            </div>
        </div>

        <!-- 하단 GNB 네비게이션 -->
        <div class="fixed bottom-0 w-full max-w-md bg-white border-t flex text-center text-sm shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button id="navMonthly" class="flex-1 py-4 tab-active">월간 대시보드</button>
            <button id="navAnnual" class="flex-1 py-4 tab-inactive">연간 결산</button>
        </div>
    </div>

    <script>
        let globalData = [];
        let globalAssets = 0;
        let currentDate = new Date(2026, 5, 1); // 기본 화면: 2026년 6월

        // 차트 객체 초기화
        let sankeyInstance = echarts.init(document.getElementById('sankeyChart'));
        let annualBarInstance = echarts.init(document.getElementById('annualBarChart'));
        let annualPieInstance = echarts.init(document.getElementById('annualPieChart'));

        // 하단 탭 전환 로직
        document.getElementById('navMonthly').addEventListener('click', () => switchTab('monthly'));
        document.getElementById('navAnnual').addEventListener('click', () => { switchTab('annual'); renderAnnual(); });

        function switchTab(tab) {
            document.getElementById('tab-monthly').classList.toggle('hide', tab !== 'monthly');
            document.getElementById('tab-annual').classList.toggle('hide', tab !== 'annual');
            document.getElementById('navMonthly').className = `flex-1 py-4 ${tab === 'monthly' ? 'tab-active' : 'tab-inactive'}`;
            document.getElementById('navAnnual').className = `flex-1 py-4 ${tab === 'annual' ? 'tab-active' : 'tab-inactive'}`;
            setTimeout(() => { sankeyInstance.resize(); annualBarInstance.resize(); annualPieInstance.resize(); }, 100);
        }

        // 파일 업로드 및 파싱
        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});

                // 1. 자산 파싱 (중복 방지 및 군인공제 적용)
                parseAssets(workbook.Sheets['뱅샐현황']);
                
                // 2. 가계부 내역 파싱
                globalData = XLSX.utils.sheet_to_json(workbook.Sheets['가계부 내역']);
                
                updateDashboard();
            };
            reader.readAsArrayBuffer(file);
        });

        // 자산 파싱 핵심 로직 (6억 오류 해결)
        function parseAssets(sheet) {
            if (!sheet) return;
            const data = XLSX.utils.sheet_to_json(sheet, {header: 1});
            let total = 0;
            let inFinanceSection = false;

            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                if (row[1] === '3.재무현황') { inFinanceSection = true; continue; }
                if (row[1] === '4.보험현황' || row[1] === '5.투자현황') { inFinanceSection = false; break; } // 여기서 차단하여 중복 합산 방지

                // 금액은 E열(인덱스 4)에 존재
                if (inFinanceSection && row[4] !== undefined && !isNaN(row[4])) {
                    total += Number(row[4]);
                }
            }

            // 군인공제회 자산 추가 (기본 1190만원 + 매월 5.5만원)
            // 기준을 편의상 오늘 날짜와 2026년 6월의 차이로 계산 (현재 데모는 1190만 고정)
            const militaryMutualAid = 11900000; 
            globalAssets = total + militaryMutualAid;
            
            document.getElementById('totalAsset').innerText = globalAssets.toLocaleString() + ' 원';
        }

        // 월 네비게이션 제어
        document.getElementById('prevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); updateDashboard(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); updateDashboard(); });

        function updateDashboard() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            
            // UI 업데이트 (회계 기준일 표시)
            document.getElementById('currentMonthLabel').innerText = `${year}년 ${month}월`;
            
            let prevMonthStr = String(month).padStart(2, '0');
            let nextMonthStr = String(month === 12 ? 1 : month + 1).padStart(2, '0');
            document.getElementById('cycleLabel').innerText = `(${prevMonthStr}.10 ~ ${nextMonthStr}.09)`;

            // 데이터 필터링 (매월 10일 ~ 익월 9일)
            const startDate = new Date(year, month - 1, 10, 0, 0, 0);
            const endDate = new Date(year, month, 9, 23, 59, 59);

            let income = 0;
            let expense = 0;
            let categories = {};

            globalData.forEach(row => {
                // 엑셀 날짜 파싱 (일련번호 or 텍스트)
                let dateObj = new Date(row['날짜']);
                if (typeof row['날짜'] === 'number') dateObj = new Date(Math.round((row['날짜'] - 25569) * 86400 * 1000));
                
                if (dateObj >= startDate && dateObj <= endDate) {
                    const type = row['타입'];
                    let amount = Number(row['금액']);
                    if (isNaN(amount)) return;

                    if (type === '수입') {
                        income += amount;
                    } else if (type === '지출') {
                        amount = Math.abs(amount); // 음수를 양수로
                        expense += amount;
                        const cat = row['대분류'] || '미분류';
                        categories[cat] = (categories[cat] || 0) + amount;
                    }
                }
            });

            document.getElementById('totalIncome').innerText = income.toLocaleString() + ' 원';
            document.getElementById('totalExpense').innerText = expense.toLocaleString() + ' 원';

            renderSankey(income, expense, categories);
            updateBudgetUI(year, month, expense);
        }

        // 예산 관리 로직
        document.getElementById('setBudgetBtn').addEventListener('click', () => {
            const input = document.getElementById('budgetInput').value;
            if(input) {
                const key = `budget_${currentDate.getFullYear()}_${currentDate.getMonth() + 1}`;
                localStorage.setItem(key, input);
                updateDashboard();
            }
        });

        document.getElementById('loadPrevBudget').addEventListener('click', () => {
            let prevDate = new Date(currentDate);
            prevDate.setMonth(prevDate.getMonth() - 1);
            const prevKey = `budget_${prevDate.getFullYear()}_${prevDate.getMonth() + 1}`;
            const prevBudget = localStorage.getItem(prevKey);
            if(prevBudget) {
                document.getElementById('budgetInput').value = prevBudget;
                localStorage.setItem(`budget_${currentDate.getFullYear()}_${currentDate.getMonth() + 1}`, prevBudget);
                updateDashboard();
            } else {
                alert("저번 달 예산 데이터가 없습니다.");
            }
        });

        function updateBudgetUI(year, month, expense) {
            const key = `budget_${year}_${month}`;
            const budget = localStorage.getItem(key);
            const bar = document.getElementById('budgetBar');
            const status = document.getElementById('budgetStatus');

            if (!budget) {
                document.getElementById('budgetInput').value = '';
                bar.style.width = '0%';
                status.innerText = '예산을 설정해주세요.';
                return;
            }

            document.getElementById('budgetInput').value = budget;
            const percentage = (expense / Number(budget)) * 100;
            const cappedPercent = Math.min(percentage, 100);
            
            bar.style.width = `${cappedPercent}%`;
            
            if (percentage < 80) {
                bar.className = 'h-4 transition-all duration-500 bg-green-500';
            } else if (percentage <= 100) {
                bar.className = 'h-4 transition-all duration-500 bg-yellow-400';
            } else {
                bar.className = 'h-4 transition-all duration-500 bg-red-500';
            }

            status.innerHTML = `예산 <b>${Number(budget).toLocaleString()}원</b> 중 <b>${percentage.toFixed(1)}%</b> 사용`;
        }

        // 생키 다이어그램 렌더링
        function renderSankey(income, expense, categories) {
            if (income === 0 && expense === 0) {
                sankeyInstance.clear();
                return;
            }

            let nodes = [{name: '수입'}, {name: '지출'}];
            let links = [];

            let remaining = income - expense;

            if (remaining >= 0) {
                if(remaining > 0) {
                    nodes.push({name: '잔여/저축'});
                    links.push({source: '수입', target: '잔여/저축', value: remaining});
                }
                if(expense > 0) links.push({source: '수입', target: '지출', value: expense});
            } else {
                nodes.push({name: '초과지출'});
                if(income > 0) links.push({source: '수입', target: '지출', value: income});
                links.push({source: '초과지출', target: '지출', value: Math.abs(remaining)});
            }

            // 노드 이름 중복 방지를 위해 카테고리명 앞에 마커 추가
            for (const [cat, val] of Object.entries(categories)) {
                let catName = `[카테고리] ${cat}`;
                nodes.push({name: catName});
                links.push({source: '지출', target: catName, value: val});
            }

            const option = {
                tooltip: { trigger: 'item', triggerOn: 'mousemove' },
                series: {
                    type: 'sankey',
                    layout: 'none',
                    emphasis: { focus: 'adjacency' },
                    data: nodes,
                    links: links,
                    lineStyle: { color: 'gradient', curveness: 0.5 },
                    label: { fontSize: 11 }
                }
            };
            sankeyInstance.setOption(option, true);
        }

        // 연간 결산 로직
        function renderAnnual() {
            if(globalData.length === 0) return;

            let monthlyStats = {};
            let totalCats = {};

            globalData.forEach(row => {
                let dateObj = new Date(row['날짜']);
                if (typeof row['날짜'] === 'number') dateObj = new Date(Math.round((row['날짜'] - 25569) * 86400 * 1000));
                
                // 10일 기준 회계월 계산
                let y = dateObj.getFullYear();
                let m = dateObj.getMonth() + 1; // 1~12
                let d = dateObj.getDate();

                // 1~9일은 전월로 편입
                if (d < 10) {
                    m -= 1;
                    if (m === 0) { m = 12; y -= 1; }
                }

                let cycleKey = `${y}-${String(m).padStart(2, '0')}`;
                if (!monthlyStats[cycleKey]) monthlyStats[cycleKey] = { income: 0, expense: 0 };

                const type = row['타입'];
                let amount = Number(row['금액']);
                if (isNaN(amount)) return;

                if (type === '수입') {
                    monthlyStats[cycleKey].income += amount;
                } else if (type === '지출') {
                    amount = Math.abs(amount);
                    monthlyStats[cycleKey].expense += amount;
                    
                    const cat = row['대분류'] || '미분류';
                    totalCats[cat] = (totalCats[cat] || 0) + amount;
                }
            });

            // 1. 연간 바 차트
            const sortedKeys = Object.keys(monthlyStats).sort().slice(-12); // 최근 12개월
            const barOption = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['수입', '지출'] },
                xAxis: { type: 'category', data: sortedKeys.map(k => k.substring(2)) },
                yAxis: { type: 'value', show: false },
                series: [
                    { name: '수입', type: 'bar', data: sortedKeys.map(k => monthlyStats[k].income), itemStyle: {color: '#34d399'} },
                    { name: '지출', type: 'bar', data: sortedKeys.map(k => monthlyStats[k].expense), itemStyle: {color: '#f87171'} }
                ]
            };
            annualBarInstance.setOption(barOption);

            // 2. 파이 차트
            let pieData = Object.keys(totalCats).map(key => ({ name: key, value: totalCats[key] }));
            pieData.sort((a, b) => b.value - a.value); // 내림차순 정렬
            
            const pieOption = {
                tooltip: { trigger: 'item' },
                series: [{
                    type: 'pie',
                    radius: ['40%', '70%'],
                    itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                    data: pieData.slice(0, 7) // 상위 7개만 표시
                }]
            };
            annualPieInstance.setOption(pieOption);
        }
    </script>
</body>
</html>
